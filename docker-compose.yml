services:
  postgres:
    image: postgres:15.17-trixie
    container_name: wns-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wns_challenge}
      POSTGRES_USER: ${POSTGRES_USER:-wns_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wns_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-wns_user} -d ${POSTGRES_DB:-wns_challenge}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
